name: ProQuo — Review Price Tag
description: Prices every PR in reviewer minutes and nudges oversized diffs toward a split — makes review burden visible.
inputs:
  github-token:
    description: >
      Token used to read PR files on a pull_request run (safe on any PR, including forks — needs
      only read access) or to write the sticky comment on a workflow_run run (needs a write-capable
      token; only run that job from workflow_run, never directly on a fork PR's pull_request job).
    required: true
runs:
  using: node24
  main: dist/index.mjs
branding:
  icon: tag
  color: green
