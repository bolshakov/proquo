name: price-tag
on:
  pull_request:
    types: [ opened, synchronize, reopened ]
permissions:
  contents: read
  pull-requests: write
jobs:
  price:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
