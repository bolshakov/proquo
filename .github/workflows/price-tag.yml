name: 🏷️ ProQuo
on:
  pull_request_target:
    types: [ opened, synchronize, reopened ]
permissions:
  contents: read
  pull-requests: write
  issues: write
jobs:
  price:
    name: Review Price Tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
