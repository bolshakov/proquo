name: ci
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Verify dist/index.mjs is up to date
        run: git diff --exit-code dist/index.mjs
